<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — MT Fitness Coaching</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">
      <svg class="logo-svg" viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
        <polyline points="10,55 45,15 65,35 85,10 115,55" fill="none" stroke="#b8d400" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
        <text x="8" y="30" fill="none" stroke="#b8d400" stroke-width="1.5" font-family="Inter,sans-serif" font-weight="700" font-size="20" letter-spacing="1">mt</text>
      </svg>
    </a>
    <a href="index.html" class="btn-outline" style="font-size:0.85rem; padding:0.5rem 1.2rem;">← Back Home</a>
  </nav>

  <!-- CONTACT PAGE -->
  <main class="contact-page">
    <div class="container">

      <div class="contact-header reveal">
        <p class="section-label">Get In Touch</p>
        <h1>Let's build your <span class="accent">program.</span></h1>
        <p>Tell us about yourself and your goals. We'll get back to you within 24 hours.</p>
      </div>

      <!--
        Netlify Forms: the `netlify` attribute + `netlify-honeypot` enables spam filtering.
        Email notifications are configured in your Netlify dashboard under
        Site > Forms > [form name] > Notifications.
        Target email: jacobalexander2017@gmail.com
      -->
      <form
        class="contact-form reveal"
        name="contact"
        method="POST"
        data-netlify="true"
        netlify-honeypot="bot-field"
        action="/success.html"
      >
        <!-- Netlify hidden fields -->
        <input type="hidden" name="form-name" value="contact" />
        <p style="display:none;">
          <label>Don't fill this out: <input name="bot-field" /></label>
        </p>

        <div class="form-row">
          <div class="form-group">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" name="first-name" placeholder="Alex" required />
          </div>
          <div class="form-group">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" name="last-name" placeholder="Johnson" required />
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="alex@example.com" required />
        </div>

        <div class="form-group">
          <label for="goal">Primary Goal</label>
          <select id="goal" name="goal" required>
            <option value="" disabled selected>Select your main goal…</option>
            <option value="build-muscle">Build Muscle</option>
            <option value="lose-fat">Lose Fat</option>
            <option value="improve-performance">Improve Athletic Performance</option>
            <option value="general-fitness">General Fitness & Health</option>
            <option value="injury-recovery">Injury Recovery / Prehab</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="experience">Training Experience</label>
          <select id="experience" name="experience" required>
            <option value="" disabled selected>How long have you been training?</option>
            <option value="beginner">Beginner (0–1 year)</option>
            <option value="intermediate">Intermediate (1–3 years)</option>
            <option value="advanced">Advanced (3+ years)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Tell Us More</label>
          <textarea
            id="message"
            name="message"
            rows="5"
            placeholder="What are you looking to achieve? Any injuries, equipment, or schedule constraints we should know about?"
          ></textarea>
        </div>

        <div class="form-submit">
          <button type="submit" class="btn-submit">Send Message →</button>
        </div>
      </form>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <svg class="logo-svg footer-logo" viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
        <polyline points="10,55 45,15 65,35 85,10 115,55" fill="none" stroke="#b8d400" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
        <text x="8" y="30" fill="none" stroke="#b8d400" stroke-width="1.5" font-family="Inter,sans-serif" font-weight="700" font-size="20" letter-spacing="1">mt</text>
      </svg>
      <p>&copy; 2026 MT Fitness Coaching. All rights reserved.</p>
      <a href="index.html">Home</a>
    </div>
  </footer>

  <script>
    const reveals = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    reveals.forEach(el => observer.observe(el));
  </script>
</body>
</html>
